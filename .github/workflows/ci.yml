name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff linter
        run: ruff check app/ --output-format=github
        continue-on-error: false

      - name: Run pytest (all db calls mocked)
        env:
          # DB URL must be asyncpg-prefixed; conftest patches all calls so no real DB needed
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          SECRET_KEY: ci-test-secret-key-32chars-minimum
          ARHA_PASSPHRASE: ci-test-passphrase-for-fernet
          OPENAI_API_KEY: sk-test-ci-placeholder
          TAVILY_API_KEY: tvly-test-ci-placeholder
          SERPER_API_KEY: test-serper-key
          UPSTASH_REDIS_URL: redis://localhost:6379
          UPSTASH_REDIS_TOKEN: test-token
          SENDGRID_API_KEY: SG.test
          TELEGRAM_BOT_TOKEN: 0000000000:test
          ADMIN_EMAIL: admin@test.com
          ARHA_ENV: testing
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t arha-api:test ./backend
