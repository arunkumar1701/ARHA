services:
  - type: web
    name: arha-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: ARHA_PASSPHRASE
        sync: false
      - key: ARHA_FRONTEND_URL
        sync: false

  - type: cron
    name: arha-public-discovery
    runtime: python
    schedule: "0 */6 * * *"
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python -m app.cloud_worker"
    envVars:
      - key: ARHA_PUBLIC_DISCOVERY_ONLY
        value: "true"
