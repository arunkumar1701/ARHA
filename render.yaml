services:
  - type: cron
    name: arha-public-discovery
    runtime: python
    schedule: "0 */6 * * *"
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python -m app.cloud_worker"
    envVars:
      - key: ARHA_PUBLIC_DISCOVERY_ONLY
        value: "true"
