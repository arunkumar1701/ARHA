# Render.com deployment configuration for ARHA v2
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: arha-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: arha-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false

databases:
  - name: arha-db
    plan: free
    region: oregon
    databaseName: arha
    user: arha_user
